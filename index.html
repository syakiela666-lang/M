<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <title>Monitoring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="app">

        <!-- Sticky Header: Search + Settings + Tabs -->
        <header class="app-header">
            <!-- Row 1: Search + Settings -->
            <div class="search-sort-row">
                <div class="search-input-wrap">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Cari koin..." autocomplete="off" autocorrect="off" spellcheck="false">
                    <button id="search-clear" class="search-clear-btn" style="display:none;">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <button id="settings-btn" class="btn-icon" title="Settings">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <select id="sort-select" class="sort-select">
                    <option value="name">Name</option>
                    <option value="high">High %</option>
                </select>
            </div>
            <!-- Row 2: Tabs -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="favorites">★ Favorites</button>
                <button class="tab-btn" data-tab="allcoins">All Coins</button>
            </div>
        </header>

        <!-- Settings Popup -->
        <div class="settings-popup" id="settings-popup">
            <div class="settings-backdrop" id="settings-backdrop"></div>
            <div class="settings-content">
                <div class="settings-title">Ukuran Tampilan</div>
                <div class="settings-slider-row">
                    <span class="slider-label">Kecil</span>
                    <input type="range" id="size-slider" class="size-slider-popup" min="70" max="100" value="100" step="5">
                    <span class="slider-label">Besar</span>
                </div>
                <div class="settings-value" id="slider-value">100%</div>
            </div>
        </div>

        <!-- Content area with tab panels -->
        <div class="content-area">
            <!-- Favorites Tab -->
            <div class="tab-panel active" id="tab-favorites">
                <div class="favorites-list" id="favorites-list"></div>
                <div class="empty-fav" id="empty-fav">Belum ada koin favorit. Tap ☆ untuk menambahkan.</div>
            </div>

            <!-- All Coins Tab -->
            <div class="tab-panel" id="tab-allcoins">
                <div class="allcoins-grid" id="allcoins-list"></div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>

        <!-- Floating Refresh Button -->
        <button id="refresh-btn" class="fab-refresh" title="Refresh Harga">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        </button>

    </div>

    <script src="app.js"></script>
</body>
</html>
